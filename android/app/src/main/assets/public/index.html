<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowHer</title>

    <!-- PWA: Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA: Theme color for browser chrome -->
    <meta name="theme-color" content="#C899CB" />

    <!-- PWA: Apple iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlowHer" />
    <link rel="apple-touch-icon" href="/flowher_logo.svg" />

    <!-- PWA: Microsoft tiles -->
    <meta name="msapplication-TileImage" content="/flowher_logo.svg" />
    <meta name="msapplication-TileColor" content="#2d0a3e" />
    <script type="module" crossorigin src="/assets/index-ComAsqtE.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DYQoVR0L.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- PWA: Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('FlowHer SW registered:', reg.scope))
            .catch(err => console.error('FlowHer SW error:', err));
        });
      }
    </script>
  </body>
</html>
